<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LLM Vision Chat</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        #chat-box { border: 1px solid #ccc; height: 500px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .message { margin-bottom: 15px; padding: 10px; border-radius: 8px; }
        .user { background: #e3f2fd; margin-left: 20px; }
        .assistant { background: #f5f5f5; margin-right: 20px; }
        .img-preview { max-width: 300px; max-height: 300px; display: block; margin-top: 8px; border-radius: 4px; border: 1px solid #ddd; }
        .input-area { display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>LLM Vision Chat</h1>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="file" id="image-upload" accept="image/*">
        <input type="text" id="text-input" placeholder="Ask about the image..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatBox = document.getElementById("chat-box");
        const textInput = document.getElementById("text-input");
        const imageUpload = document.getElementById("image-upload");
        let messages = [];

        function appendMessage(role, contentMarkup) {
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.innerHTML = `<strong>${role === 'user' ? 'You' : 'Assistant'}:</strong> <div class="content">${contentMarkup}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div.querySelector('.content');
        }

        async function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function sendMessage() {
            const text = textInput.value.trim();
            const file = imageUpload.files[0];
            
            if (!text && !file) return;

            let userContent = [];
            let displayHTML = "";

            if (text) {
                userContent.push({ type: "text", text: text });
                displayHTML += text;
            }

            if (file) {
                const base64Image = await fileToBase64(file);
                userContent.push({
                    type: "image_url",
                    image_url: { url: base64Image }
                });
                displayHTML += `<br><img src="${base64Image}" class="img-preview">`;
                imageUpload.value = '';
            }

            let apiContent = userContent;
            if (userContent.length === 1 && userContent[0].type === "text") {
                apiContent = userContent[0].text;
            }

            messages.push({ role: "user", content: apiContent });
            appendMessage("user", displayHTML);
            textInput.value = "";

            const assistantSpan = appendMessage("assistant", "<span style='color: #888;'>Thinking...</span>");
            let fullResponse = "";

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages: messages })
                });

                if (!response.body) throw new Error("No response body");

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                assistantSpan.innerHTML = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            if (dataStr === '[DONE]') break;
                            if (!dataStr) continue;
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.content) {
                                    fullResponse += data.content;
                                    assistantSpan.innerText = fullResponse;
                                    chatBox.scrollTop = chatBox.scrollHeight;
                                }
                            } catch (e) {
                                console.error("Parse error:", e, dataStr);
                            }
                        }
                    }
                }
                
                messages.push({ role: "assistant", content: fullResponse });
                
            } catch (error) {
                console.error("Error:", error);
                assistantSpan.innerHTML = "<span style='color:red;'>Error generating response.</span>";
            }
        }
    </script>
</body>
</html>
